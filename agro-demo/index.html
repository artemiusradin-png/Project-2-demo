  .noscroll{-ms-overflow-style:none;scrollbar-width:none}
  .sheet-in{animation:sheetIn .26s cubic-bezier(.22,1,.36,1)}
  @keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .fade-in{animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .spin{animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}

      <div className="bg-white mx-4 rounded-2xl divide-y divide-cardLine">
        {FILTERS.map(([label,key])=>(
          <button key={key} onClick={()=>openModal(key)} className="w-full flex items-center px-4 h-[64px]">
            <div className="flex-1 text-left">
              <div className="text-[15px] text-ink">{label}</div>
              <div className="text-[12px] text-muted mt-0.5">{selected[key]?.length? selected[key].join(', ') : 'Не вибрано'}</div>
            </div>
            <I.chevR className="w-[18px] h-[18px] text-muted"/>
          </button>
        ))}
      </div>
      <div className="px-4 mt-7">
        <button onClick={back} className="w-full h-[52px] rounded-2xl bg-brand text-white text-[16px] font-semibold">Переглянути (862)</button>
      </div>
    </div>
  );
}

function FilterModal({k,close,selected,setSelected}){
  const L=LISTS[k]; const cur=selected[k]||[];
  const [pick,setPick]=useState(cur);
  const toggle=(it)=> setPick(p=> p.includes(it)? p.filter(x=>x!==it):[...p,it]);
  return (
    <div className="absolute inset-0 z-30 flex flex-col justify-end">
      <div className="absolute inset-0 bg-black/35" onClick={close}/>
      <div className="relative bg-white rounded-t-[22px] h-[88%] flex flex-col sheet-in">
        <div className="relative flex items-center justify-center pt-4 pb-3 border-b border-cardLine">
          <button onClick={close} className="absolute left-5 text-ink"><I.x className="w-[22px] h-[22px]"/></button>
          <div className="text-[16px] font-semibold text-ink px-10 text-center truncate">{L.title}</div>
          <button onClick={()=>setPick([])} className="absolute right-5 text-[14px] text-lav font-medium">Очистити</button>
        </div>
        <div className="px-4 pt-3"><div className="bg-bg rounded-xl h-[44px] flex items-center gap-2 px-4"><I.search className="w-[17px] h-[17px] text-muted"/><span className="text-[14px] text-muted">Пошук від 3-х символів</span></div></div>
        <div className="flex-1 overflow-y-auto noscroll px-5 mt-1">
          {L.items.map(it=>{
            const on=pick.includes(it);
            return (
              <button key={it} onClick={()=>toggle(it)} className="w-full flex items-center justify-between py-[14px] border-b border-cardLine text-left">
                <span className={`text-[15px] text-ink ${L.i?'italic':''}`}>{it}</span>
                {on && <div className="w-[22px] h-[22px] rounded-md bg-brand flex items-center justify-center"><I.check className="w-[14px] h-[14px] text-white"/></div>}
              </button>
            );
          })}
          <div className="h-24"/>
        </div>
        <div className="p-4 border-t border-cardLine">
          <button disabled={!pick.length} onClick={()=>{setSelected(s=>({...s,[k]:pick}));close();}}
            className={`w-full h-[52px] rounded-2xl text-[16px] font-semibold text-white ${pick.length?'bg-brand':'bg-lav'}`}>
            Підтвердити вибір{pick.length?` (${pick.length})`:''}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ───────── Agro-Vision AI (Block А): photo → diagnosis → SKU prescription ───────── */
function AgroVision({close,role}){
  const [stage,setStage]=useState('intro'); // intro | loading | result
  const [scn,setScn]=useState(null);
  const [img,setImg]=useState(null);
  const fileRef=useRef();
  const run=(key,dataUrl)=>{ setScn(key); setImg(dataUrl||null); setStage('loading');
    setTimeout(()=>setStage('result'), 2200); };
  const onFile=e=>{ const f=e.target.files?.[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>run('corn',r.result); r.readAsDataURL(f); };
  const S = scn? SCENARIOS[scn] : null;

  return (
    <div className="absolute inset-0 z-40 bg-white flex flex-col fade-in">
      <div className="bg-gradient-to-br from-brand to-[#6B7CFF] text-white">
        <StatusBar/>
        <div className="relative flex items-center justify-center pb-3">
          <button onClick={close} className="absolute left-4 text-white"><I.back className="w-6 h-6"/></button>
          <div className="text-[16px] font-bold flex items-center gap-1.5">Agro-Vision AI <I.spark className="w-4 h-4"/></div>
          <span className="absolute right-4 text-[10px] bg-white/20 px-2 py-1 rounded-full font-semibold">DEMO · MOCK AI</span>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto noscroll">
        {stage==='intro' && (
          <div className="p-5 fade-in">
            <div className="rounded-2xl border-2 border-dashed border-brand/30 bg-brand/5 p-7 flex flex-col items-center text-center">
              <div className="w-16 h-16 rounded-full bg-brand/10 flex items-center justify-center mb-3"><I.cam className="w-8 h-8 text-brand"/></div>
              <div className="text-[17px] font-bold text-ink">Сфотографуйте рослину</div>
              <div className="text-[13px] text-muted mt-1.5 mb-5">AI визначить культуру, шкідника, бур’ян чи хворобу та видасть «рецепт» із каталогу (20k+ SKU, дозволених в Україні), з урахуванням наявності на складах.</div>
              <button onClick={()=>fileRef.current.click()} className="w-full h-[50px] rounded-2xl bg-brand text-white text-[15px] font-semibold flex items-center justify-center gap-2 mb-2">
                <I.upload className="w-5 h-5"/> Завантажити фото
              </button>
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={onFile}/>
              <div className="text-[12px] text-muted">або оберіть демо-сценарій:</div>
            </div>
            <div className="grid grid-cols-3 gap-2.5 mt-4">
              {[['corn','🌽','Кукурудза'],['sun','🌻','Соняшник'],['wheat','🌾','Пшениця']].map(([k,e,n])=>(
                <button key={k} onClick={()=>run(k)} className="rounded-xl border border-cardLine bg-white py-4 flex flex-col items-center gap-1.5 active:bg-bg">
                  <span className="text-3xl">{e}</span><span className="text-[12px] text-ink font-medium">{n}</span>
                </button>
              ))}
            </div>
            <div className="mt-5 rounded-xl bg-bg p-3.5 text-[11.5px] text-muted leading-relaxed">
              <b className="text-ink">Як це працює:</b> фото → мультимодальна LLM (Claude) визначає об’єкт → запит у каталог (RAG) → структурований «рецепт» рівня Senior-агронома. Деталі архітектури — у <b>HOWITWORKS.md</b>.
            </div>
          </div>
        )}

        {stage==='loading' && (
          <div className="p-5 flex flex-col items-center justify-center h-full text-center fade-in">
            {img && <img src={img} className="w-40 h-40 object-cover rounded-2xl mb-5 ring-1 ring-cardLine"/>}
            <svg viewBox="0 0 24 24" className="w-9 h-9 text-brand spin mb-4" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2.4" opacity=".2"/><path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"/></svg>
            <div className="text-[16px] font-bold text-ink">AI аналізує зображення…</div>
            <div className="text-[12.5px] text-muted mt-1.5 space-y-0.5">
              <div>● Розпізнавання культури</div><div>● Діагностика шкідника / хвороби</div><div>● Підбір препаратів із каталогу</div>
            </div>
            <div className="w-44 h-1.5 bg-bg rounded-full mt-5 overflow-hidden"><div className="h-full bg-brand rounded-full bar"/></div>
          </div>
        )}

        {stage==='result' && S && (
          <div className="p-4 pb-8 space-y-3.5 fade-in">
            {img && <img src={img} className="w-full h-40 object-cover rounded-2xl ring-1 ring-cardLine"/>}
            <div className="rounded-2xl bg-mint p-4">
              <div className="text-[11px] font-semibold text-[#3FA98B] uppercase tracking-wide">Культуру визначено</div>
              <div className="text-[17px] font-bold text-ink mt-1 flex items-center gap-2"><span className="text-2xl">{S.emoji}</span>{S.crop}</div>
              <div className="text-[12px] text-[#3FA98B] mt-1">Впевненість: {S.cropConf}%</div>
            </div>

            <div className="rounded-2xl border border-[#F0C9C0] bg-[#FDF1ED] p-4">
              <div className="flex items-center gap-2 text-[#C2502F]"><I.alert className="w-[18px] h-[18px]"/><span className="text-[11px] font-bold uppercase tracking-wide">{S.kind} · впевненість {S.conf}%</span></div>
              <div className="text-[17px] font-bold text-ink mt-1.5">{S.problem}</div>
              <div className="text-[12px] italic text-muted">{S.problemLat}</div>
              <div className="text-[13px] text-ink/80 mt-2 leading-relaxed">{S.signs}</div>
            </div>

            <div>
              <div className="text-[14px] font-bold text-ink mb-2 flex items-center gap-1.5"><I.leaf className="w-[18px] h-[18px] text-brand"/>«Рецепт» — рекомендовані препарати</div>
              <div className="space-y-2.5">
                {S.rx.map((r,i)=>(
                  <div key={i} className="rounded-xl border border-cardLine bg-white p-3.5">
                    <div className="flex justify-between items-start">
                      <div className="text-[15px] font-bold text-ink">{r.n}</div>
                      <div className="text-[11px] bg-brand/10 text-brand font-semibold px-2 py-1 rounded-full whitespace-nowrap ml-2">{r.v}</div>
                    </div>
                    <div className="text-[12.5px] text-muted mt-0.5">{r.t}</div>
                    <div className="flex items-center justify-between mt-2.5 text-[12.5px]">
                      <span className="text-ink"><b>Норма:</b> {r.d}</span>
                      <span className={`flex items-center gap-1 ${r.stock.startsWith('В наявності')?'text-[#0A7C45]':'text-[#C98A3A]'}`}>
                        <span className="w-1.5 h-1.5 rounded-full" style={{background:'currentColor'}}/>{r.stock}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="rounded-2xl bg-bg p-4">
              <div className="text-[12px] font-bold text-ink mb-1">Агрономічний коментар{role?` · для ролі «${role}»`:''}</div>
              <div className="text-[12.5px] text-ink/75 leading-relaxed">{S.notes}</div>
            </div>

            <div className="flex gap-2.5">
              <button onClick={()=>setStage('intro')} className="flex-1 h-[50px] rounded-2xl border border-brand text-brand text-[15px] font-semibold">Інше фото</button>
              <button className="flex-1 h-[50px] rounded-2xl bg-brand text-white text-[15px] font-semibold">Додати в кошик</button>
            </div>
            <div className="text-[11px] text-muted text-center">Демо-дані. У продакшені «рецепт» формується з реального каталогу Salesforce + залишків складів.</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ───────────────────────── App ───────────────────────── */
function App(){
  const [tab,setTab]=useState('home');
  const [screen,setScreen]=useState(null);    // null | 'seeds'
  const [modal,setModal]=useState(null);      // null | filter key
  const [ai,setAI]=useState(false);
  const [role,setRole]=useState(null);
  const [selected,setSelected]=useState({});

  let body;
  if(screen==='seeds') body=<SeedsFilter back={()=>setScreen(null)} openModal={setModal} selected={selected}/>;
  else if(tab==='home') body=<Home setTab={setTab} openAI={()=>setAI(true)} role={role} setRole={setRole}/>;
  else if(tab==='catalog') body=<Catalog openSeeds={()=>setScreen('seeds')}/>;
  else if(tab==='cart') body=<Cart/>;
  else body=<Profile/>;

  return (
    <div className="min-h-screen w-full flex flex-col items-center justify-center py-6 px-4">
      <div className="text-center mb-4">
        <div className="text-[15px] font-bold text-ink">AgroPlatforma — iOS UI Demo <span className="text-brand">+ Agro-Vision AI</span></div>
        <div className="text-[12px] text-slate-500 mt-0.5">deviewai · клікабельний прототип для дзвінка · натисніть синю картку «Agro-Vision AI»</div>
      </div>
      {/* iPhone frame */}
      <div className="relative" style={{width:'390px',height:'844px'}}>
        <div className="absolute -inset-[12px] rounded-[64px] bg-[#1d1f26] shadow-2xl"/>
        <div className="absolute -inset-[2px] rounded-[54px] bg-black"/>
        <div className="relative w-full h-full rounded-[52px] overflow-hidden bg-bg">
          {body}
          {!ai && !screen && <TabBar tab={tab} setTab={(t)=>{setTab(t);setScreen(null);}}/>}
          {screen==='seeds' && !modal && !ai && <TabBar tab={'catalog'} setTab={(t)=>{setTab(t);setScreen(null);}}/>}
          {modal && <FilterModal k={modal} close={()=>setModal(null)} selected={selected} setSelected={setSelected}/>}
          {ai && <AgroVision close={()=>setAI(false)} role={role}/>}
          <div className="absolute bottom-2 inset-x-0 flex justify-center pointer-events-none z-50"><div className="w-[134px] h-[5px] rounded-full bg-black/30"/></div>
        </div>
      </div>
      <div className="text-[11px] text-slate-400 mt-4 text-center max-w-[390px]">8 екранів зі скріншотів відтворено 1:1 · Блок А (Agro-Vision) — робочий мок · реальне підключення Claude API описано в HOWITWORKS.md</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
